<!DOCTYPE html>
<html lang="en">
<head>
guard.js
<meta charset="UTF-8">
<title>Free Coding Playground</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  background: #020617;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #1d4ed8;
}

select, textarea {
  width: 100%;
  background: black;
  color: #4ade80;
  border-radius: 6px;
  padding: 10px;
  font-family: monospace;
  font-size: 14px;
}

textarea {
  margin-bottom: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.panel {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
}

iframe {
  width: 100%;
  height: 220px;
  background: white;
  border-radius: 6px;
  border: none;
}

pre {
  background: black;
  color: #4ade80;
  padding: 10px;
  height: 220px;
  overflow: auto;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
<header>
  <h2>Free Coding Playground</h2>
  <button onclick="logout()">Logout</button>
</header>
  <h2>Free Coding Playground</h2>
  <!-- ✅ Lessons Button -->
  <button onclick="window.open('lessons.html','_blank')">📘 Coding Lessons</button>
</header>

<div class="container">

  <!-- Editor -->
  <div class="panel">
    <h3>Editor</h3>

    <select id="language" onchange="switchLanguage()">
      <option value="js">JavaScript</option>
      <option value="html">HTML / CSS</option>
    </select>

    <!-- ✅ TEXT ➜ JAVASCRIPT FEATURE -->
    <h4>Text ➜ JavaScript</h4>
    <textarea id="textInput" placeholder="Type text here..."
      oninput="convertTextToJS()" style="color:#e5e7eb; height:80px;">
    </textarea>

    <textarea id="jsOutput" readonly style="height:60px;"></textarea>

    <!-- JavaScript Editor -->
    <div id="jsEditor">
      <textarea id="jsCode" style="height:120px;">
console.log("Hello, world!");
2 + 2;
      </textarea>
      <button onclick="runJS()">▶ Run Code</button>
    </div>

    <!-- HTML/CSS Editor -->
    <div id="htmlEditor" style="display:none;">
      <textarea id="htmlCode" style="color:#7dd3fc; height:100px;">
<h1>Hello World</h1>
      </textarea>
      <textarea id="cssCode" style="color:#f9a8d4; height:100px;">
body { font-family: Arial; }
      </textarea>
    </div>
  </div>

  <!-- Output -->
  <div class="panel">
    <h3>Console Output</h3>
    <pre id="output"></pre>
  </div>

  <!-- Preview -->
  <div class="panel">
    <h3>Live Preview</h3>
    <iframe id="preview"></iframe>
  </div>

</div>

<script>
function switchLanguage() {
  const lang = document.getElementById("language").value;
  document.getElementById("jsEditor").style.display = lang === "js" ? "block" : "none";
  document.getElementById("htmlEditor").style.display = lang === "html" ? "block" : "none";
  if (lang === "html") updatePreview();
}

function runJS() {
  const output = document.getElementById("output");
  output.textContent = "";

  const originalLog = console.log;
  console.log = (...args) => {
    output.textContent += args.join(" ") + "\n";
  };

  try {
    const result = eval(document.getElementById("jsCode").value);
    if (result !== undefined) output.textContent += result + "\n";
  } catch (err) {
    output.textContent = "Error: " + err.message;
  }

  console.log = originalLog;
}

function updatePreview() {
  const html = document.getElementById("htmlCode").value;
  const css = document.getElementById("cssCode").value;
  document.getElementById("preview").srcdoc =
    `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}</body></html>`;
}

document.getElementById("htmlCode").addEventListener("input", updatePreview);
document.getElementById("cssCode").addEventListener("input", updatePreview);

function convertTextToJS() {
  const text = document.getElementById("textInput").value
    .replace(/\\/g, "\\\\")
    .replace(/"/g, '\\"')
    .replace(/\n/g, "\\n");

  document.getElementById("jsOutput").value =
    'console.log("' + text + '");';
}
</script>

</body>
</html>
