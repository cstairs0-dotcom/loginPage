<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        .complete-screen {
            display: none;
            background-color: #2ecc71;
            color: white;
            font-size: 36px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="container">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="completeScreen" class="container complete-screen">
    COMPLETE
</div>

<script>
function login() {
  // ✅ Demo credentials
  const username = document.querySelector('input[type="text"]').value;
  const password = document.querySelector('input[type="password"]').value;

  if (username === "CodingWithCaiden" && password === "12345678") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "main.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
